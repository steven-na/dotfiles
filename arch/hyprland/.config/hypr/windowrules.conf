# ── Spotify transparency ──────────────────────────────────────────────────────
# Barely-noticeable opacity lets Hyprland's compositor blur show wallpaper
# bleed-through behind the CSS rgba panels in the spicetify theme.
windowrule {
    name          = spotify-transparency
    match:class   = Spotify
    opacity       = 0.90 override
}

# ── Floating terminal (Super+Q with float-term class) ─────────────────────────
windowrule {
    name  = float-term
    match:class = float-term
    float        = true
    center       = true
    stay_focused = true
    size         = 900 600
}

# ── Wallpaper picker ─────────────────────────────────────────────────────────
windowrule {
    name  = wallpaper-picker
    match:class = wallpaper-picker
    float  = true
    center = true
    size   = 1200 700
}

# ── bemenu launcher window ────────────────────────────────────────────────────
windowrule {
    name  = launcher
    match:class = launcher
    float  = true
    center = true
    size   = 800 500
}

# ── Suppress maximize requests ────────────────────────────────────────────────
windowrule {
    name       = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# ── Fix XWayland drag artifacts ───────────────────────────────────────────────
windowrule {
    name            = fix-xwayland-drags
    match:class     = ^$
    match:title     = ^$
    match:xwayland  = true
    match:float     = true
    match:fullscreen = false
    match:pin       = false
    no_focus        = true
}

# ── Inhibit idle when fullscreen ─────────────────────────────────────────────
windowrule {
    name           = no-idle-fullscreen
    match:fullscreen = true
    idle_inhibit   = fullscreen
}
