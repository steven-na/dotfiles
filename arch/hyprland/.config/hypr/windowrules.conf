# ── Spotify ──────────────────────────────────────────────────────
windowrule {
    name          = spotify-transparency
    match:class   = Spotify
    opacity       = 0.90 override
}

windowrule {
    name = spotify-special
    match:class = Spotify
    workspace = special:spotify silent
}

# ── Floating terminal ─────────────────────────
windowrule {
    name  = float-term
    match:class = float-term
    float        = true
    center       = true
    stay_focused = true
    size         = 900 600
}

# ── Wallpaper picker ─────────────────────────────────────────────────────────
windowrule {
    name  = wallpaper-picker
    match:class = wallpaper-picker
    float  = true
    center = true
    size   = 1200 700
}

# ── bemenu launcher window ────────────────────────────────────────────────────
windowrule {
    name  = launcher
    match:class = launcher
    float  = true
    center = true
    size   = 800 500
}

# ── Suppress maximize requests ────────────────────────────────────────────────
windowrule {
    name       = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# ── Fix XWayland drag artifacts ───────────────────────────────────────────────
windowrule {
    name            = fix-xwayland-drags
    match:class     = ^$
    match:title     = ^$
    match:xwayland  = true
    match:float     = true
    match:fullscreen = false
    match:pin       = false
    no_focus        = true
}

# ── Inhibit idle when fullscreen ─────────────────────────────────────────────
windowrule {
    name           = no-idle-fullscreen
    match:fullscreen = true
    idle_inhibit   = fullscreen
}

# ── Smart gaps ───────────────────────────────────────────────────────────────
workspace = w[tv1]s[false], gapsout:0, gapsin:0
workspace = f[1]s[false], gapsout:0, gapsin:0

windowrule {
    name = no-gaps-single
    match:float = false
    match:workspace = w[tv1]s[false]
    border_size = 0
    rounding = 0
    no_shadow = false
}

windowrule {
    name = no-gaps-fullscreen
    match:float = false
    match:workspace = f[1]s[false]
    border_size = 0
    rounding = 0
    no_shadow = false
}

# ── Bar ─────────────────────────────────────────────
layerrule = blur on, match:namespace ^(gtk-layer-shell)$
layerrule = ignore_alpha 0.5, match:namespace ^(gtk-layer-shell)$
